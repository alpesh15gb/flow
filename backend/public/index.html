<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Cashflow Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #e8eaf0;
      --muted:    #7b7f93;
      --green:    #22c55e;
      --red:      #ef4444;
      --blue:     #3b82f6;
      --yellow:   #f59e0b;
      --radius:   12px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* Login */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 360px; }
    .login-box h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .login-box p { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .login-box input { width: 100%; padding: 0.75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; margin-bottom: 0.75rem; }
    .login-box input:focus { outline: none; border-color: var(--blue); }
    .btn { width: 100%; padding: 0.75rem; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .err { color: var(--red); font-size: 0.8rem; margin-top: 0.5rem; display: none; }

    /* App */
    #app { display: none; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.6rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: color 0.2s; }
    .logout-btn:hover { color: var(--text); }

    .content { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    /* Summary cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .card-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.5rem; }
    .card-value { font-size: 1.75rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .card-value.green  { color: var(--green); }
    .card-value.red    { color: var(--red); }
    .card-value.blue   { color: var(--blue); }
    .card-value.yellow { color: var(--yellow); }

    /* Charts */
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    @media (max-width: 680px) { .charts { grid-template-columns: 1fr; } }
    .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .chart-box h2 { font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .chart-wrap { position: relative; height: 200px; }

    /* Transactions table */
    .tx-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .tx-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .tx-header h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .tx-filters { display: flex; gap: 0.5rem; }
    .tx-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { padding: 0.6rem 1rem; text-align: left; font-size: 0.75rem; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 100px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .badge-sale     { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge-expense  { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge-purchase { background: rgba(59,130,246,0.15); color: var(--blue); }
    .amount-cell { font-variant-numeric: tabular-nums; font-weight: 600; }
    .note-cell { color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .empty-row td { text-align: center; color: var(--muted); padding: 2rem; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--muted); font-size: 0.875rem; padding: 1rem; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Range tabs */
    .tabs { display: flex; gap: 0.25rem; background: var(--bg); border-radius: 8px; padding: 3px; margin-bottom: 1.5rem; width: fit-content; }
    .tab { padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.2s; }
    .tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>Flow</h1>
    <p>Cashflow dashboard — enter your device ID to continue</p>
    <input id="device-id" type="text" placeholder="Device ID (any unique string)" autocomplete="off">
    <input id="display-name" type="text" placeholder="Your name (optional)" autocomplete="off">
    <button class="btn" onclick="login()">Sign In</button>
    <p class="err" id="login-err"></p>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <h1>Flow</h1>
    <div class="topbar-right">
      <span id="user-label" style="font-size:0.8rem;color:var(--muted)"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <!-- Range tabs -->
    <div class="tabs">
      <button class="tab active" onclick="setRange('daily')">Today</button>
      <button class="tab" onclick="setRange('monthly')">This Month</button>
    </div>

    <!-- Summary cards -->
    <div class="cards">
      <div class="card"><div class="card-label">Sales</div><div class="card-value green" id="c-sales">—</div></div>
      <div class="card"><div class="card-label">Expenses</div><div class="card-value red" id="c-expenses">—</div></div>
      <div class="card"><div class="card-label">Purchases</div><div class="card-value blue" id="c-purchases">—</div></div>
      <div class="card"><div class="card-label">Profit</div><div class="card-value" id="c-profit">—</div></div>
    </div>

    <!-- Charts -->
    <div class="charts">
      <div class="chart-box">
        <h2>Monthly Overview</h2>
        <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
      </div>
      <div class="chart-box">
        <h2>Type Breakdown</h2>
        <div class="chart-wrap"><canvas id="pie-chart"></canvas></div>
      </div>
    </div>

    <!-- Transactions -->
    <div class="tx-section">
      <div class="tx-header">
        <h2>Transactions</h2>
        <div class="tx-filters">
          <select id="type-filter" onchange="loadTransactions()">
            <option value="all">All types</option>
            <option value="sale">Sales</option>
            <option value="expense">Expenses</option>
            <option value="purchase">Purchases</option>
          </select>
        </div>
      </div>
      <div class="tx-table-wrap">
        <table>
          <thead>
            <tr><th>Date</th><th>Type</th><th>Amount</th><th>Note</th><th>Device</th></tr>
          </thead>
          <tbody id="tx-body">
            <tr><td colspan="5" class="loading"><span class="spinner"></span>Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('flow_token');
let currentRange = 'daily';
let barChart, pieChart;

function fmt(n) {
  return '₹' + parseFloat(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function shortDevice(d) {
  return d ? d.slice(0, 8) + '…' : '—';
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function login() {
  const deviceId = document.getElementById('device-id').value.trim();
  const name = document.getElementById('display-name').value.trim();
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  if (!deviceId) { err.textContent = 'Device ID is required'; err.style.display = 'block'; return; }

  try {
    const res = await fetch(`${API}/auth/simple`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: deviceId, name: name || undefined })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Login failed'; err.style.display = 'block'; return; }
    token = data.token;
    localStorage.setItem('flow_token', token);
    localStorage.setItem('flow_device', deviceId);
    showApp(name || deviceId);
  } catch (e) {
    err.textContent = 'Connection failed'; err.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('flow_token');
  token = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp(label) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-label').textContent = label || '';
  loadAll();
}

function setRange(r) {
  currentRange = r;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  loadSummary();
}

async function loadSummary() {
  const data = await apiFetch(`/dashboard/summary?range=${currentRange}`);
  if (!data) return;
  document.getElementById('c-sales').textContent = fmt(data.sales);
  document.getElementById('c-expenses').textContent = fmt(data.expenses);
  document.getElementById('c-purchases').textContent = fmt(data.purchases);
  const profitEl = document.getElementById('c-profit');
  profitEl.textContent = fmt(data.profit);
  profitEl.className = 'card-value ' + (data.profit >= 0 ? 'green' : 'red');
  updatePieChart(data);
}

async function loadTransactions() {
  const type = document.getElementById('type-filter').value;
  const data = await apiFetch(`/dashboard/transactions?limit=50&type=${type}`);
  const tbody = document.getElementById('tx-body');
  if (!data || !data.transactions.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No transactions found</td></tr>';
    return;
  }
  tbody.innerHTML = data.transactions.map(t => `
    <tr>
      <td>${t.date}</td>
      <td><span class="badge badge-${t.type}">${t.type}</span></td>
      <td class="amount-cell">${fmt(t.amount)}</td>
      <td class="note-cell">${t.note || '—'}</td>
      <td style="color:var(--muted);font-size:0.8rem">${shortDevice(t.device_id)}</td>
    </tr>
  `).join('');
}

async function loadCharts() {
  const data = await apiFetch('/dashboard/monthly-chart?months=6');
  if (!data) return;

  const months = [...new Set(data.data.map(r => r.month))].sort();
  const get = (m, type) => {
    const r = data.data.find(d => d.month === m && d.type === type);
    return r ? parseFloat(r.total) : 0;
  };

  const labels = months.map(m => { const [y, mo] = m.split('-'); return new Date(y, mo-1).toLocaleString('default', { month: 'short', year: '2-digit' }); });

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('bar-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Sales',     data: months.map(m => get(m, 'sale')),     backgroundColor: 'rgba(34,197,94,0.7)' },
        { label: 'Expenses',  data: months.map(m => get(m, 'expense')),  backgroundColor: 'rgba(239,68,68,0.7)' },
        { label: 'Purchases', data: months.map(m => get(m, 'purchase')), backgroundColor: 'rgba(59,130,246,0.7)' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#7b7f93', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#7b7f93' }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#7b7f93', callback: v => '₹' + v.toLocaleString('en-IN') }, grid: { color: '#2a2d3a' } }
      }
    }
  });
}

function updatePieChart(summary) {
  if (pieChart) pieChart.destroy();
  const total = summary.sales + summary.expenses + summary.purchases;
  if (total === 0) return;
  pieChart = new Chart(document.getElementById('pie-chart'), {
    type: 'doughnut',
    data: {
      labels: ['Sales', 'Expenses', 'Purchases'],
      datasets: [{ data: [summary.sales, summary.expenses, summary.purchases], backgroundColor: ['rgba(34,197,94,0.8)', 'rgba(239,68,68,0.8)', 'rgba(59,130,246,0.8)'], borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: { legend: { labels: { color: '#7b7f93', font: { size: 11 } } } }
    }
  });
}

function loadAll() {
  loadSummary();
  loadTransactions();
  loadCharts();
}

// Auto refresh every 60 seconds
setInterval(() => { if (token) loadAll(); }, 60000);

// Init
window.addEventListener('DOMContentLoaded', () => {
  if (token) {
    const d = localStorage.getItem('flow_device') || 'user';
    showApp(d);
  }
});
</script>
</body>
</html>
