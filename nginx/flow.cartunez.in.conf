# /etc/nginx/sites-available/flow.cartunez.in
# Run: sudo certbot --nginx -d flow.cartunez.in  (after enabling this config)

server {
    listen 80;
    listen [::]:80;
    server_name flow.cartunez.in;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flow.cartunez.in;

    # SSL — managed by Certbot (it will update these paths)
    ssl_certificate     /etc/letsencrypt/live/flow.cartunez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flow.cartunez.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;

    # API — forward to Docker backend (only accessible on loopback)
    location /api {
        proxy_pass http://127.0.0.1:4100;
    }

    # Health check (no auth)
    location /health {
        proxy_pass http://127.0.0.1:4100;
    }

    # Web dashboard
    location /dashboard {
        proxy_pass http://127.0.0.1:4100;
    }

    # Root → redirect to dashboard
    location = / {
        return 301 /dashboard;
    }

    # Block everything else
    location / {
        return 404;
    }
}
